<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargement - Expatriation Framework</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0E1C; /* Bleu nuit */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 550px;
            padding: 24px;
        }
        .loader {
            border: 3px solid #1a233d;
            border-top: 3px solid #C8A96A; /* Doré */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
        }
        h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: #FFFFFF;
        }
        p {
            color: #8E9AA8;
            font-size: 15px;
            line-height: 1.6;
        }
        a {
            color: #C8A96A;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(200, 169, 106, 0.3);
            transition: border-color 0.2s;
        }
        a:hover {
            border-bottom-color: #C8A96A;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader" id="main-loader"></div>
        <h1 id="main-title">Authentification réussie</h1>
        <p id="main-text">Préparation de votre Framework sécurisé.<br>Le téléchargement va démarrer automatiquement...</p>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var fileUrl = "../assets/kit-expatriation-framework-2026.pdf";
        
        var hiddenLink = document.createElement('a');
        hiddenLink.href = fileUrl;
        hiddenLink.download = 'Kit Expatriation Framework 2026.pdf';
        
        // Déclenchement automatique après 1,5 seconde
        setTimeout(function() {
            document.body.appendChild(hiddenLink);
            hiddenLink.click();
            document.body.removeChild(hiddenLink);
            
            // ÉTAPE VISUELLE SUIVANTE : On change le texte et on cache le loader
            setTimeout(function() {
                document.getElementById("main-loader").style.display = "none";
                document.getElementById("main-title").innerText = "Merci pour votre confiance";
                document.getElementById("main-text").innerHTML = "Le téléchargement de votre Framework a commencé.<br><br>Si le fichier ne s'est pas ouvert, <a href='" + fileUrl + "' download='Kit Expatriation Framework 2026.pdf'>cliquez ici pour forcer le téléchargement</a>.";
            }, 500);
            
        }, 1500);
    });
    </script>

</body>
</html>
